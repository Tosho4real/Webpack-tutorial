<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Face -->
  <circle cx="50" cy="50" r="45" fill="#FFD700" stroke="#333" stroke-width="2"/>
  
  <!-- Left Eye -->
  <circle cx="35" cy="40" r="5" fill="#333"/>
  
  <!-- Right Eye -->
  <circle cx="65" cy="40" r="5" fill="#333"/>
  
  <!-- Left Eye Squint (laughing) -->
  <path d="M 25 40 Q 35 50 45 40" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Right Eye Squint (laughing) -->
  <path d="M 55 40 Q 65 50 75 40" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Mouth (big laugh) -->
  <path d="M 35 60 Q 50 75 65 60" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Tears of laughter (optional) -->
  <circle cx="35" cy="52" r="2" fill="#87CEEB"/>
  <circle cx="65" cy="52" r="2" fill="#87CEEB"/>
</svg>